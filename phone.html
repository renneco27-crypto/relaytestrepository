<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Interview Mic</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 24px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.3s;
  }
  body.listening {
    background: #064e3b;
  }
  h1 { font-size: 18px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
  #status {
    font-size: 13px;
    color: #888;
    text-align: center;
    min-height: 20px;
    transition: color 0.2s;
  }
  #status.listening { color: #10b981; }
  #status.error { color: #ef4444; }
  #status.connected { color: #3b82f6; }

  #micIcon {
    font-size: 64px;
    transition: transform 0.2s;
  }
  body.listening #micIcon {
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  #interim {
    font-size: 13px;
    color: #6b7280;
    text-align: center;
    min-height: 18px;
    max-width: 320px;
    font-style: italic;
  }
  #lastFinal {
    font-size: 14px;
    color: #d1d5db;
    text-align: center;
    max-width: 320px;
    line-height: 1.5;
    min-height: 40px;
  }

  #relayStatus {
    font-size: 11px;
    color: #4b5563;
    display: flex; align-items: center; gap: 6px;
  }
  #relayDot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #374151;
    transition: background 0.3s;
  }
  #relayDot.on { background: #10b981; }
  #relayDot.off { background: #ef4444; }

  #hint { font-size: 11px; color: #4b5563; text-align: center; }
</style>
</head>
<body onclick="toggleMic()">

<h1>Interview Mic</h1>

<div id="relayStatus">
  <div id="relayDot"></div>
  <span id="relayLabel">Connecting to relay...</span>
</div>

<div id="micIcon">🎤</div>

<div id="status">Tap anywhere to start</div>
<div id="interim"></div>
<div id="lastFinal"></div>
<div id="hint">Keep this page open during your interview</div>

<script>
  const RELAY_URL    = '{{RELAY_URL}}';
  const RELAY_SECRET = '{{RELAY_SECRET}}';

  let recognition    = null;
  let isListening    = false;
  let relaySocket    = null;
  let pingInterval   = null;
  let reconnectTimer = null;

  function connectRelay() {
    clearTimeout(reconnectTimer);
    if (relaySocket && relaySocket.readyState === WebSocket.OPEN) return;

    relaySocket = new WebSocket(RELAY_URL + '?role=phone&secret=' + RELAY_SECRET);

    relaySocket.onopen = () => {
      setRelayStatus(true);
      pingInterval = setInterval(() => {
        if (relaySocket?.readyState === WebSocket.OPEN)
          relaySocket.send(JSON.stringify({ type: 'ping' }));
      }, 20000);
    };

    relaySocket.onclose = () => {
      setRelayStatus(false);
      clearInterval(pingInterval);
      reconnectTimer = setTimeout(connectRelay, 5000);
    };

    relaySocket.onerror = () => {
      setRelayStatus(false);
    };
  }

  function sendTranscript(text, isFinal) {
    if (relaySocket?.readyState === WebSocket.OPEN)
      relaySocket.send(JSON.stringify({ type: 'transcript', text, isFinal }));
  }

  function setRelayStatus(connected) {
    document.getElementById('relayDot').className   = connected ? 'on' : 'off';
    document.getElementById('relayLabel').textContent = connected
      ? 'Relay connected' : 'Relay disconnected - retrying...';
  }

  function toggleMic() {
    if (isListening) stopMic();
    else startMic();
  }

  function startMic() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      setStatus('Use Chrome on Android or Safari on iOS.', 'error');
      return;
    }

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous      = true;
    recognition.interimResults  = true;
    recognition.maxAlternatives = 1;
    recognition.lang            = 'en-US';

    recognition.onstart = () => {
      isListening = true;
      document.body.classList.add('listening');
      document.getElementById('micIcon').textContent = '🔴';
      setStatus('Listening...', 'listening');
    };

    recognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          document.getElementById('lastFinal').textContent = t.trim();
          sendTranscript(t.trim(), true);
        } else {
          interim += t;
          sendTranscript(t, false);
        }
      }
      document.getElementById('interim').textContent = interim;
    };

    recognition.onerror = (e) => {
      if (e.error === 'not-allowed') {
        setStatus('Microphone blocked. Check browser permissions.', 'error');
        stopMic();
      } else if (e.error === 'network') {
        setStatus('Network error - check connection.', 'error');
      } else if (e.error !== 'no-speech') {
        setStatus('Error: ' + e.error, 'error');
      }
    };

    recognition.onend = () => {
      if (isListening) {
        try { recognition.start(); } catch (err) {}
      } else {
        document.body.classList.remove('listening');
        document.getElementById('micIcon').textContent = '🎤';
        setStatus('Tap anywhere to start', '');
        document.getElementById('interim').textContent = '';
      }
    };

    try { recognition.start(); } catch (err) {}
  }

  function stopMic() {
    isListening = false;
    if (recognition) { try { recognition.stop(); } catch (e) {} recognition = null; }
    document.body.classList.remove('listening');
    document.getElementById('micIcon').textContent = '🎤';
    setStatus('Tap anywhere to start', '');
    document.getElementById('interim').textContent = '';
  }

  function setStatus(msg, cls) {
    const el = document.getElementById('status');
    el.textContent  = msg;
    el.className    = cls || '';
  }

  connectRelay();

  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(() => {});
  }
</script>
</body>
</html>
