<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Interview Mic</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 24px;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.3s;
  }
  body.listening { background: #052e16; }

  h1 { font-size: 18px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }

  /* Relay status */
  #relayStatus {
    font-size: 11px;
    color: #4b5563;
    display: flex; align-items: center; gap: 6px;
  }
  #relayDot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #374151;
    transition: background 0.3s;
  }
  #relayDot.on  { background: #10b981; }
  #relayDot.off { background: #ef4444; }

  /* Active mic indicator */
  #activeMic {
    font-size: 12px;
    color: #6b7280;
    text-align: center;
    padding: 8px 16px;
    background: #161b22;
    border: 1.5px solid #1f2937;
    border-radius: 10px;
    max-width: 420px;
    width: 100%;
    transition: border-color 0.3s, color 0.3s;
  }
  #activeMic.cable { border-color: #3b82f6; color: #93c5fd; }
  #activeMic.physical { border-color: #10b981; color: #6ee7b7; }
  #activeMic.unknown { border-color: #f59e0b; color: #fcd34d; }

  /* Two capture cards side by side */
  #cards {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 420px;
  }
  .card {
    flex: 1;
    border-radius: 14px;
    border: 1.5px solid #1f2937;
    background: #161b22;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .card:active { opacity: 0.8; }
  .card.active {
    border-color: #10b981;
    background: #052e16;
  }
  .card.error-state { border-color: #ef4444; }
  .card.disabled {
    opacity: 0.35;
    pointer-events: none;
  }

  .card-icon { font-size: 36px; }
  .card-icon.pulse { animation: pulse 1.5s infinite; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.18); }
  }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #6b7280;
  }
  .card.active .card-label { color: #10b981; }

  .card-status {
    font-size: 11px;
    color: #4b5563;
    text-align: center;
    min-height: 14px;
  }
  .card.active .card-status { color: #34d399; }
  .card.error-state .card-status { color: #f87171; }

  /* Last heard transcript boxes */
  #transcripts {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .tx-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    min-height: 18px;
  }
  .tx-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    margin-top: 1px;
    flex-shrink: 0;
  }
  .tx-badge.you         { background: #064e3b; color: #6ee7b7; }
  .tx-badge.interviewer { background: #1e3a5f; color: #93c5fd; }
  .tx-text {
    font-size: 12px;
    color: #9ca3af;
    line-height: 1.5;
    font-style: italic;
  }
  .tx-text.final { color: #d1d5db; font-style: normal; }

  /* Setup instructions box */
  #hint {
    font-size: 11px;
    color: #374151;
    text-align: center;
    max-width: 380px;
    line-height: 1.7;
  }
  #hint b { color: #4b5563; font-weight: 600; }
  #hint .step { color: #6b7280; }
  #hint .highlight { color: #60a5fa; font-weight: 600; }

  /* Language selector */
  #langSelector {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 420px;
    width: 100%;
  }
  #langSelector span {
    font-size: 10px;
    color: #4b5563;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    margin-right: 2px;
  }
  .lang-btn {
    font-size: 11px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid #1f2937;
    background: #161b22;
    color: #6b7280;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .lang-btn:active { opacity: 0.75; }
  .lang-btn.selected {
    border-color: #10b981;
    background: #052e16;
    color: #6ee7b7;
  }
  .lang-btn.lang-auto.selected {
    border-color: #a78bfa;
    background: #2e1065;
    color: #c4b5fd;
  }

  /* Mode badge */
  #modeBadge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    background: #1e3a5f;
    color: #93c5fd;
  }
  #modeBadge.mode-mic { background: #064e3b; color: #6ee7b7; }
  #modeBadge.mode-interviewer { background: #1e3a5f; color: #93c5fd; }
  #modeBadge.mode-both { background: #3b1f5e; color: #c4b5fd; }

  /* One-tap start overlay */
  #startOverlay {
    position: fixed;
    inset: 0;
    background: #0f1117;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 100;
    cursor: pointer;
    transition: opacity 0.3s;
  }
  #startOverlay.hidden { opacity: 0; pointer-events: none; }
  #startOverlay h2 { font-size: 22px; font-weight: 700; color: #fff; }
  #startOverlay p  { font-size: 13px; color: #6b7280; text-align: center; max-width: 300px; line-height: 1.6; }
  #startBtn {
    margin-top: 8px;
    padding: 14px 36px;
    background: #10b981;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: -0.2px;
  }
  #startBtn:active { opacity: 0.85; }
  #overlayNote { font-size: 11px; color: #374151; text-align: center; max-width: 300px; }
</style>
</head>
<body>

<!-- One-tap gate -->
<div id="startOverlay" onclick="handleStart()">
  <div style="font-size:52px">🎙️</div>
  <h2>Interview Copilot</h2>
  <p id="overlayDesc">One tap to start. Chrome will ask for mic permission — make sure you pick the right device.</p>
  <button id="startBtn">Tap to Begin</button>
  <p id="overlayNote"></p>
</div>

<h1>Interview Copilot</h1>

<div id="modeBadge"></div>

<!-- Language selector -->
<div id="langSelector">
  <span>Lang:</span>
  <button class="lang-btn lang-auto" onclick="setLang('auto')" id="btn-auto">🌐 Auto</button>
  <button class="lang-btn selected" onclick="setLang('en-US')"  id="btn-en-US">🇺🇸 English</button>
  <button class="lang-btn" onclick="setLang('fil-PH')" id="btn-fil-PH">🇵🇭 Filipino</button>
  <button class="lang-btn" onclick="setLang('ceb-PH')" id="btn-ceb-PH">🇵🇭 Bisaya</button>
</div>

<div id="relayStatus">
  <div id="relayDot"></div>
  <span id="relayLabel">Connecting to relay…</span>
</div>

<!-- Shows which mic Chrome is actually using -->
<div id="activeMic">Detecting mic…</div>

<!-- Capture cards -->
<div id="cards">
  <div class="card" id="micCard" onclick="toggleMic()">
    <div class="card-icon" id="micIcon">🎤</div>
    <div class="card-label">Your Mic</div>
    <div class="card-status" id="micStatus">Idle</div>
  </div>

  <div class="card" id="tabCard" onclick="toggleTab()">
    <div class="card-icon" id="tabIcon">🖥️</div>
    <div class="card-label">Interviewer</div>
    <div class="card-status" id="tabStatus">Idle</div>
  </div>
</div>

<!-- Live transcript previews -->
<div id="transcripts">
  <div class="tx-row" id="youRow" style="display:none">
    <span class="tx-badge you">You</span>
    <span class="tx-text" id="youText"></span>
  </div>
  <div class="tx-row" id="themRow" style="display:none">
    <span class="tx-badge interviewer">Interviewer</span>
    <span class="tx-text" id="themText"></span>
  </div>
</div>

<div id="hint"></div>

<script>
  const RELAY_URL      = '{{RELAY_URL}}';
  const RELAY_SECRET   = '{{RELAY_SECRET}}';
  const DEEPGRAM_KEY   = '{{DEEPGRAM_KEY}}';   // ← paste your Deepgram API key here
  const params         = new URLSearchParams(location.search);
  const AUTOSTART      = params.get('autostart') === '1';
  const MODE           = params.get('mode') || 'both'; // 'mic', 'interviewer', or 'both'

  // ── Language management ────────────────────────────────────────────────
  // Deepgram supports multilingual models natively.
  // 'auto' uses Deepgram's multi-language detection (no cycling needed).
  // fil-PH and en-US map to Deepgram language codes.
  // ceb-PH falls back to fil-PH (closest supported model).

  const DG_LANG_MAP = {
    'en-US':  'en-US',
    'fil-PH': 'fil',
    'ceb-PH': 'fil',   // Deepgram has no ceb model; fil is closest
    'auto':   'multi', // Deepgram's multilingual detection
  };

  let selectedLang  = 'en-US'; // 'auto' | 'en-US' | 'fil-PH' | 'ceb-PH'

  function getDGLang() {
    return DG_LANG_MAP[selectedLang] || 'en-US';
  }

  // Web Speech API uses standard BCP-47 tags (different from Deepgram codes)
  function getEffectiveLang() {
    if (selectedLang === 'auto')   return 'fil-PH'; // best single default for auto
    if (selectedLang === 'ceb-PH') return 'fil-PH'; // Chrome doesn't support ceb-PH
    return selectedLang;
  }

  function setLang(lang) {
    selectedLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'));
    const btnId = lang === 'auto'   ? 'btn-auto'
                : lang === 'en-US'  ? 'btn-en-US'
                : lang === 'fil-PH' ? 'btn-fil-PH'
                :                     'btn-ceb-PH';
    const btn = document.getElementById(btnId);
    if (btn) btn.classList.add('selected');

    // Restart active recognitions with new lang
    if (micListening)          { stopMic();          startMic(); }
    if (interviewerListening)  { stopInterviewer();  startInterviewer(); }
  }

  // ── Deepgram keyword boosting ─────────────────────────────────────────
  // Replaces the old regex VOCAB_CORRECTIONS table.
  // Deepgram boosts recognition probability for these terms at the model
  // level — no post-processing needed. Format: "word:boost" (boost 1–10).
  // https://developers.deepgram.com/docs/keywords

  const DG_KEYWORDS = [
    // Hiring & offer
    'hiring:2', 'onboarding:2', 'offboarding:2', 'requisition:2',
    'headcount:2', 'leveling:2', 'rubric:2', 'scorecard:2', 'debrief:2',
    // Compensation
    'RSUs:3', 'vesting:2', 'OTE:3', 'HRBP:3', 'PTO:3', 'PIP:3',
    'KPIs:3', 'OKRs:3', '401k:2',
    // Job titles
    'CTO:3', 'CEO:3', 'CFO:3', 'COO:3', 'VP:2',
    // Work arrangement
    'async:2', 'WFH:2', 'hybrid:2',
    // Tech interview
    'Docker:3', 'Kubernetes:3', 'microservices:2', 'GraphQL:3',
    'TypeScript:3', 'PostgreSQL:3', 'Redis:3', 'CI/CD:3',
  ];

  // ── Mode setup ─────────────────────────────────────────────────────────
  // Chrome's getUserMedia ALWAYS uses one mic per window — whatever Chrome
  // has set for this site. You CANNOT capture two different audio devices
  // on the same page.
  //
  // Solution: open the page in TWO windows with different Chrome profiles
  // (or one normal + one incognito). Each window sets a different mic in
  // Chrome's site settings.
  //
  //   Window 1: /?mode=mic           → Chrome mic = physical mic
  //   Window 2: /?mode=interviewer   → Chrome mic = CABLE Output (VB-Cable)
  //
  // Both connect to the same relay (WebSocket). Audio is streamed to
  // Deepgram's API for transcription. Transcripts are labelled correctly.

  function setupMode() {
    const badge = document.getElementById('modeBadge');
    const hint  = document.getElementById('hint');
    const overlayDesc = document.getElementById('overlayDesc');
    const overlayNote = document.getElementById('overlayNote');

    if (MODE === 'mic') {
      badge.textContent = '🎤 Your Mic Mode';
      badge.className = 'mode-mic';
      document.getElementById('tabCard').classList.add('disabled');
      overlayDesc.innerHTML = 'This window captures <b>your voice</b>.<br>When Chrome asks, pick your <b>physical microphone</b>.';
      overlayNote.innerHTML = 'Open a second window with <b>?mode=interviewer</b> for the other person\'s audio.';
      hint.innerHTML =
        '<b>🎤 Your Mic Mode</b><br>' +
        'This window transcribes <b>your voice</b> using your physical mic.<br>' +
        'Chrome is using the mic shown above ↑';
    } else if (MODE === 'interviewer') {
      badge.textContent = '🖥️ Interviewer Mode';
      badge.className = 'mode-interviewer';
      document.getElementById('micCard').classList.add('disabled');
      overlayDesc.innerHTML = 'This window captures <b>interviewer audio</b> via VB-Cable.<br>When Chrome asks, pick <b>CABLE Output (VB-Audio Virtual Cable)</b>.';
      overlayNote.innerHTML = '⚠️ Open this in <b>Incognito</b> or a <b>different Chrome profile</b> so it gets its own mic setting.';
      hint.innerHTML =
        '<b>🖥️ Interviewer Mode</b><br>' +
        'This window transcribes <b>interviewer audio</b> from VB-Cable.<br><br>' +
        '<span class="step">1.</span> Set <span class="highlight">CABLE Input</span> as your <b>default speaker</b> in Windows Sound settings<br>' +
        '<span class="step">2.</span> In Google Meet → use your <b>real mic</b> for your voice,<br>' +
        '&nbsp;&nbsp;&nbsp;and set speaker to <span class="highlight">CABLE Input</span><br>' +
        '<span class="step">3.</span> Chrome above should show <span class="highlight">CABLE Output</span> as the active mic<br><br>' +
        'Not seeing CABLE Output? Click the 🔒 icon in the address bar →<br>Site settings → Microphone → select <b>CABLE Output</b> → reload.';
    } else {
      badge.textContent = '⚡ Both Channels';
      badge.className = 'mode-both';
      overlayDesc.innerHTML =
        'One tap to start.<br><br>' +
        '⚠️ <b>Important:</b> Chrome can only use ONE mic per window.<br>' +
        'For best results, open <b>two separate windows</b>:';
      overlayNote.innerHTML =
        'Window 1: <b>?mode=mic</b> (normal Chrome)<br>' +
        'Window 2: <b>?mode=interviewer</b> (Incognito / different profile)';
      hint.innerHTML =
        '<b>⚡ Combined Mode</b><br>' +
        'Both cards use the <b>same mic</b> (Chrome\'s default for this site).<br>' +
        'Transcripts will be labelled differently but come from the same source.<br><br>' +
        'For <b>true dual-source capture</b>, use two windows:<br>' +
        '<span class="highlight">?mode=mic</span> + <span class="highlight">?mode=interviewer</span>';
    }
  }

  // ── Detect which mic Chrome is actually using ──────────────────────────
  let detectedMicLabel = '';

  async function detectActiveMic() {
    const el = document.getElementById('activeMic');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const track  = stream.getAudioTracks()[0];
      const label  = track.label || 'Unknown device';
      detectedMicLabel = label;
      track.stop();

      el.textContent = '🎧 Chrome is using: ' + label;

      const lower = label.toLowerCase();
      if (lower.includes('cable') || lower.includes('vb-audio') || lower.includes('virtual')) {
        el.className = 'cable';
        if (MODE === 'mic') {
          el.textContent += ' ⚠️ (This is VB-Cable — you need your physical mic here!)';
          el.className = 'unknown';
        }
      } else {
        el.className = 'physical';
        if (MODE === 'interviewer') {
          el.textContent += ' ⚠️ (This is your physical mic — you need VB-Cable here!)';
          el.className = 'unknown';
        }
      }
    } catch (err) {
      el.textContent = '⚠️ Mic access denied — grant permission first';
      el.className = 'unknown';
    }
  }

  // ── Relay ────────────────────────────────────────────────────────────
  let relaySocket    = null;
  let pingInterval   = null;
  let reconnectTimer = null;

  function connectRelay() {
    clearTimeout(reconnectTimer);
    if (relaySocket?.readyState === WebSocket.OPEN) return;
    relaySocket = new WebSocket(RELAY_URL + '?role=phone&secret=' + RELAY_SECRET);

    relaySocket.onopen = () => {
      setRelayDot(true);
      pingInterval = setInterval(() => {
        if (relaySocket?.readyState === WebSocket.OPEN)
          relaySocket.send(JSON.stringify({ type: 'ping' }));
      }, 20000);
    };
    relaySocket.onclose = () => {
      setRelayDot(false);
      clearInterval(pingInterval);
      reconnectTimer = setTimeout(connectRelay, 5000);
    };
    relaySocket.onerror = () => setRelayDot(false);
  }

  // ── Deepgram WebSocket factory ────────────────────────────────────────
  // Opens a Deepgram streaming session for a given MediaStream.
  // Returns { dgSocket, mediaRecorder, stop() }.
  //
  // Deepgram params used:
  //   model=nova-3          — best accuracy, lowest latency
  //   language              — mapped from selectedLang via getDGLang()
  //   smart_format=true     — auto-punctuation, number formatting
  //   interim_results=true  — partial transcripts for live UI
  //   utterance_end_ms=1000 — fires UtteranceEnd after 1 s of silence
  //   vad_events=true       — voice activity detection events
  //   keywords              — boost list (replaces regex corrections)
  //   endpointing=300       — treat 300 ms of silence as end of utterance

  function buildDGUrl() {
    const kw = DG_KEYWORDS.map(k => 'keywords=' + encodeURIComponent(k)).join('&');
    return (
      'wss://api.deepgram.com/v1/listen' +
      '?model=nova-3' +
      '&language=' + getDGLang() +
      '&smart_format=true' +
      '&interim_results=true' +
      '&utterance_end_ms=1000' +
      '&vad_events=true' +
      '&endpointing=300' +
      '&encoding=webm-opus' +
      '&' + kw
    );
  }

  function openDGSession(stream, { onInterim, onFinal, onError, onClose, onFallback, labelEl }) {
    const dgSocket = new WebSocket(buildDGUrl(), ['token', DEEPGRAM_KEY]);
    let mediaRecorder = null;
    let fallbackTriggered = false;

    function triggerFallback() {
      if (fallbackTriggered) return;
      fallbackTriggered = true;
      mediaRecorder?.stop();
      stream.getTracks().forEach(t => t.stop());
      if (dgSocket.readyState === WebSocket.OPEN)
        dgSocket.send(JSON.stringify({ type: 'CloseStream' }));
      setTimeout(() => {
        if (dgSocket.readyState !== WebSocket.CLOSED) dgSocket.close();
      }, 500);
      if (onFallback) onFallback();
    }

    dgSocket.onopen = () => {
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0 && dgSocket.readyState === WebSocket.OPEN)
          dgSocket.send(e.data);
      };
      mediaRecorder.start(250);
    };

    dgSocket.onmessage = (evt) => {
      let msg;
      try { msg = JSON.parse(evt.data); } catch { return; }

      if (msg.type === 'Results') {
        const alt = msg.channel?.alternatives?.[0];
        if (!alt) return;
        const text = alt.transcript?.trim();
        if (!text) return;
        if (msg.is_final) {
          onFinal(text, msg.speech_final);
        } else {
          onInterim(text);
        }
      } else if (msg.type === 'UtteranceEnd') {
        onFinal('', true);
      } else if (msg.type === 'error') {
        if (msg.code === 402 || (msg.description && /quota|credit|exhausted|billing/i.test(msg.description)))
          triggerFallback();
        else if (onError)
          onError(new Error(msg.description || 'Deepgram error'));
      }
    };

    dgSocket.onerror = (e) => { if (onError && !fallbackTriggered) onError(e); };
    dgSocket.onclose = (e) => {
      if (e.code === 4001 || (e.reason && /quota|credit|exhausted|billing|unauthorized/i.test(e.reason)))
        triggerFallback();
      else if (onClose)
        onClose();
    };

    function stop() {
      fallbackTriggered = true;
      mediaRecorder?.stop();
      stream.getTracks().forEach(t => t.stop());
      if (dgSocket.readyState === WebSocket.OPEN) {
        dgSocket.send(JSON.stringify({ type: 'CloseStream' }));
      }
      setTimeout(() => {
        if (dgSocket.readyState !== WebSocket.CLOSED) dgSocket.close();
      }, 500);
    }

    return { dgSocket, mediaRecorder, stop };
  }

  // ── Vocabulary correction map ─────────────────────────────────────────
  // Used when falling back to Web Speech API (Deepgram quota exhausted).
  // Deepgram handles these natively via keyword boosting — this table is
  // only active during fallback mode.

  const VOCAB_CORRECTIONS = [
    // Hiring & offer
    [/\bhypen year\b/gi,                      'hiring in a year'],
    [/\bhigh pen year\b/gi,                   'hiring in a year'],
    [/\bconsider hypen\b/gi,                  'consider hiring'],
    [/\bconsider high pen\b/gi,               'consider hiring'],
    [/\bhyp in\b/gi,                          'hiring'],
    [/\bhigher ring\b/gi,                     'hiring'],
    [/\bhi ring\b/gi,                         'hiring'],
    [/\bfull time roll\b/gi,                  'full-time role'],
    [/\bfull time role\b/gi,                  'full-time role'],
    [/\bpart time roll\b/gi,                  'part-time role'],
    [/\bon boarding\b/gi,                     'onboarding'],
    [/\breq[u]?isit[io]?n\b/gi,              'requisition'],
    [/\bhead count\b/gi,                      'headcount'],
    [/\blevel[l]?ing guide\b/gi,             'leveling guide'],
    [/\brubric\b/gi,                          'rubric'],
    [/\bscorecard\b/gi,                       'scorecard'],
    [/\bdebrief\b/gi,                         'debrief'],
    // Compensation
    [/\bbase celery\b/gi,                     'base salary'],
    [/\bbase sell a ree\b/gi,                 'base salary'],
    [/\bRSU[s]?\b/g,                          'RSUs'],
    [/\bvesting\b/gi,                         'vesting'],
    [/\bOTE\b/g,                              'OTE'],
    [/\bon target earnings\b/gi,              'on-target earnings'],
    [/\bHRBP\b/gi,                            'HRBP'],
    [/\bH R B P\b/gi,                         'HRBP'],
    [/\bPTO\b/g,                              'PTO'],
    [/\bp t o\b/gi,                           'PTO'],
    [/\bPIP\b/g,                              'PIP'],
    [/\bP I P\b/gi,                           'PIP'],
    [/\b401[kK]\b/g,                          '401(k)'],
    [/\b4 0 1 k\b/gi,                         '401(k)'],
    [/\bKPIs\b/gi,                            'KPIs'],
    [/\bK P I[s]?\b/gi,                       'KPIs'],
    [/\bOKRs\b/gi,                            'OKRs'],
    [/\bO K R[s]?\b/gi,                       'OKRs'],
    // Titles
    [/\bCTO\b/g,                              'CTO'],
    [/\bCEO\b/g,                              'CEO'],
    [/\bCFO\b/g,                              'CFO'],
    [/\bCOO\b/g,                              'COO'],
    [/\bVP\b/g,                               'VP'],
    // Work arrangement
    [/\basync\b/gi,                           'async'],
    [/\bWFH\b/g,                              'WFH'],
    [/\bhybrid roll\b/gi,                     'hybrid role'],
    // Tech
    [/\bDocker\b/gi,                          'Docker'],
    [/\bKubernetes\b/gi,                      'Kubernetes'],
    [/\bGraphQL\b/gi,                         'GraphQL'],
    [/\bTypeScript\b/gi,                      'TypeScript'],
    [/\bPostgreSQL\b/gi,                      'PostgreSQL'],
    [/\bRedis\b/gi,                           'Redis'],
    [/\bCI\/CD\b/gi,                          'CI/CD'],
    [/\bmicroservices\b/gi,                   'microservices'],
  ];

  function fixTranscript(text) {
    let out = text;
    for (const [pattern, replacement] of VOCAB_CORRECTIONS) {
      out = out.replace(pattern, replacement);
    }
    return out;
  }

  function sendTranscript(text, isFinal, speaker, phase) {
    if (relaySocket?.readyState === WebSocket.OPEN)
      relaySocket.send(JSON.stringify({ type: 'transcript', text, isFinal, speaker, phase: phase ?? 'interim' }));
  }

  function setRelayDot(on) {
    document.getElementById('relayDot').className      = on ? 'on' : 'off';
    document.getElementById('relayLabel').textContent  = on
      ? 'Relay connected' : 'Relay disconnected – retrying…';
  }

  // ── Start overlay ───────────────────────────────────────────────────
  let startFired = false;
  async function handleStart() {
    if (startFired) return;
    startFired = true;
    const el = document.getElementById('startOverlay');
    el.classList.add('hidden');
    setTimeout(() => el.remove(), 400);

    // Detect which mic Chrome is actually using
    await detectActiveMic();

    // Auto-start the appropriate card based on mode
    if (MODE === 'mic' || MODE === 'both') startMic();
    if (MODE === 'interviewer') startInterviewer();
  }

  // ── Mic channel (Deepgram — your own voice) ──────────────────────────
  let micSession     = null;   // { dgSocket, mediaRecorder, stop }
  let micListening   = false;
  let micPhase1Sent  = false;

  // ── Sentence accumulator for mic channel ─────────────────────────────
  // Deepgram fires is_final on utterance boundaries (endpointing=300ms).
  // speech_final=true + UtteranceEnd = true sentence boundary.
  // We still accumulate is_final chunks and flush on speech_final/UtteranceEnd
  // so slow speakers get one clean combined sentence to the relay.

  const MIC_SILENCE_MS = 2000;
  let micChunks        = [];
  let micSilenceTimer  = null;

  function micResetTimer() {
    clearTimeout(micSilenceTimer);
    micSilenceTimer = setTimeout(micFlush, MIC_SILENCE_MS);
  }

  function micFlush() {
    clearTimeout(micSilenceTimer);
    micSilenceTimer = null;
    if (micChunks.length === 0) return;
    const raw  = micChunks.join(' ').replace(/\s+/g, ' ').trim();
    const full = fixTranscript(raw);
    micChunks     = [];
    micPhase1Sent = false;
    if (!full) return;
    showTranscript('you', full, true);
    sendTranscript(full, true, 'you', 'final');
  }

  function micFlushImmediate() {
    clearTimeout(micSilenceTimer);
    micSilenceTimer = null;
    micFlush();
  }

  function toggleMic() {
    if (MODE === 'interviewer') return;
    if (micListening) stopMic(); else startMic();
  }

  async function startMic() {
    micUsingFallback = false;
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch {
      setCardError('mic', 'Mic blocked – check permissions.');
      return;
    }

    micListening = true;
    setCardActive('mic', true);
    document.getElementById('micIcon').classList.add('pulse');
    document.getElementById('micIcon').textContent = '🔴';
    document.getElementById('micStatus').textContent = 'Connecting to Deepgram…';
    document.body.classList.add('listening');

    micSession = openDGSession(stream, {
      onInterim(text) {
        showTranscript('you', text, false);
        if (!micPhase1Sent) {
          const firstWord = text.trim().split(/\s+/)[0];
          if (firstWord) { sendTranscript(firstWord, false, 'you', 1); micPhase1Sent = true; }
        } else {
          const preview = [...micChunks, text].join(' ').trim();
          sendTranscript(preview, false, 'you', 2);
        }
      },
      onFinal(text, speechFinal) {
        micResetTimer();
        if (text) micChunks.push(text);
        const soFar = micChunks.join(' ').trim();
        if (soFar) showTranscript('you', soFar, false);
        if (speechFinal) micFlush();
        document.getElementById('micStatus').textContent = 'Listening… [' + getDGLang() + ']';
      },
      onError() { setCardError('mic', 'Deepgram error – check your API key.'); stopMic(); },
      onClose()  { if (micListening && !micUsingFallback) { startMic(); } else if (!micListening) { resetCard('mic'); } },
      onFallback() {
        document.getElementById('micStatus').textContent = 'Deepgram unavailable – falling back to Web Speech…';
        startMicFallback();
      },
    });
  }

  function stopMic() {
    micListening = false;
    micUsingFallback = false;
    micFlushImmediate();
    micSession?.stop(); micSession = null;
    if (micRecognition) { try { micRecognition.stop(); } catch (_) {} micRecognition = null; }
    resetCard('mic');
    if (!interviewerListening) document.body.classList.remove('listening');
  }

  // ── Sentence accumulator for slow/pausing interviewers ───────────────
  // Deepgram fires is_final on utterance boundaries (endpointing=300ms).
  // A slow speaker: "Can you tell me… about your… experience with Docker?"
  // arrives as 3 separate is_final events — each fragment too short to
  // trigger AI on the overlay.
  //
  // Fix: buffer consecutive finals here on the phone. Only flush (send one
  // combined final to the overlay) after SILENCE_MS with no new transcript.
  // Interim updates still go through immediately so the live display works.
  //
  // SILENCE_MS = 2000ms gives comfortable margin for slow/deliberate speech.
  // speech_final + UtteranceEnd trigger an immediate flush.

  const SILENCE_MS    = 2000;
  let ivrChunks       = [];   // accumulated final chunks this utterance
  let ivrSilenceTimer = null; // setTimeout handle
  let ivrPhase1Sent   = false; // tracks whether phase-1 word was sent

  function ivrResetTimer() {
    clearTimeout(ivrSilenceTimer);
    ivrSilenceTimer = setTimeout(ivrFlush, SILENCE_MS);
  }

  function ivrFlush() {
    clearTimeout(ivrSilenceTimer);
    ivrSilenceTimer = null;
    if (ivrChunks.length === 0) return;
    const raw  = ivrChunks.join(' ').replace(/\s+/g, ' ').trim();
    const full = fixTranscript(raw);  // ← vocabulary correction pass
    ivrChunks     = [];
    ivrPhase1Sent = false;
    if (!full) return;
    showTranscript('them', full, true);                    // mark as final on phone UI
    sendTranscript(full, true, 'interviewer', 'final');    // one clean final to overlay
  }

  function ivrFlushImmediate() {
    // Called when recognition stops — don't wait for the timer
    clearTimeout(ivrSilenceTimer);
    ivrSilenceTimer = null;
    ivrFlush();
  }

  // ── Interviewer channel (Deepgram — VB-Cable audio) ──────────────────
  // Uses Deepgram streaming via MediaRecorder (same pattern as mic channel).
  let interviewerSession   = null;   // { dgSocket, mediaRecorder, stop }
  let interviewerListening = false;

  function toggleTab() {
    if (MODE === 'mic') return; // disabled in mic mode
    if (interviewerListening) stopInterviewer(); else startInterviewer();
  }

  async function startInterviewer() {
    ivrUsingFallback = false;
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch {
      setCardError('tab', 'Mic blocked – check permissions.');
      return;
    }

    interviewerListening = true;
    setCardActive('tab', true);
    document.getElementById('tabIcon').classList.add('pulse');
    document.getElementById('tabIcon').textContent = '🔵';
    document.getElementById('tabStatus').textContent = 'Connecting to Deepgram… [' + getDGLang() + ']';
    document.body.classList.add('listening');

    interviewerSession = openDGSession(stream, {
      onInterim(text) {
        showTranscript('them', text, false);
        if (!ivrPhase1Sent) {
          const firstWord = text.trim().split(/\s+/)[0];
          if (firstWord) { sendTranscript(firstWord, false, 'interviewer', 1); ivrPhase1Sent = true; }
        } else {
          const preview = [...ivrChunks, text].join(' ').trim();
          sendTranscript(preview, false, 'interviewer', 2);
        }
      },
      onFinal(text, speechFinal) {
        ivrResetTimer();
        if (text) ivrChunks.push(text);
        const soFar = ivrChunks.join(' ').trim();
        if (soFar) showTranscript('them', soFar, false);
        if (speechFinal) ivrFlush();
        document.getElementById('tabStatus').textContent = 'Listening… [' + getDGLang() + ']';
      },
      onError() { setCardError('tab', 'Deepgram error – check your API key.'); stopInterviewer(); },
      onClose()  { if (interviewerListening && !ivrUsingFallback) { startInterviewer(); } else if (!interviewerListening) { resetCard('tab'); } },
      onFallback() {
        document.getElementById('tabStatus').textContent = 'Deepgram unavailable – falling back to Web Speech…';
        startInterviewerFallback();
      },
    });
  }

  function stopInterviewer() {
    interviewerListening = false;
    ivrUsingFallback = false;
    ivrFlushImmediate();
    interviewerSession?.stop(); interviewerSession = null;
    if (interviewerRecognition) { try { interviewerRecognition.stop(); } catch (_) {} interviewerRecognition = null; }
    resetCard('tab');
    if (!micListening) document.body.classList.remove('listening');
  }

  // ── Web Speech fallback (when Deepgram quota is exhausted) ────────────
  let micRecognition         = null;
  let interviewerRecognition = null;
  let micUsingFallback       = false;  // true when mic channel is on Web Speech
  let ivrUsingFallback       = false;  // true when interviewer channel is on Web Speech

  function startMicFallback() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setCardError('mic', 'Chrome required for speech recognition.'); return; }

    micUsingFallback = true;
    micRecognition = new SR();
    micRecognition.continuous = true;
    micRecognition.interimResults = true;
    micRecognition.maxAlternatives = 3;
    micRecognition.lang = getEffectiveLang();

    micRecognition.onstart = () => {
      micListening = true;
      setCardActive('mic', true);
      document.getElementById('micIcon').classList.add('pulse');
      document.getElementById('micIcon').textContent = '🔴';
      document.getElementById('micStatus').textContent = '⚠️ Fallback (Web Speech) [' + getEffectiveLang() + ']';
      document.body.classList.add('listening');
    };

    micRecognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          micResetTimer();
          const chunk = t.trim();
          if (chunk) micChunks.push(chunk);
          const soFar = micChunks.join(' ').trim();
          if (soFar) showTranscript('you', soFar, false);
        } else {
          interim += t;
          if (!micPhase1Sent) {
            const firstWord = t.trim().split(/\s+/)[0];
            if (firstWord) { sendTranscript(firstWord, false, 'you', 1); micPhase1Sent = true; }
          } else {
            const preview = [...micChunks, t].join(' ').trim();
            sendTranscript(preview, false, 'you', 2);
          }
        }
      }
      if (interim) showTranscript('you', interim, false);
    };

    micRecognition.onerror = (e) => {
      if (e.error === 'not-allowed') { setCardError('mic', 'Mic blocked – check permissions.'); stopMic(); }
      else if (e.error !== 'no-speech') document.getElementById('micStatus').textContent = 'SR error: ' + e.error;
    };

    micRecognition.onend = () => {
      if (micListening) { try { micRecognition.start(); } catch (_) {} }
      else { resetCard('mic'); }
    };

    try { micRecognition.start(); } catch (_) {}
  }

  function startInterviewerFallback() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setCardError('tab', 'Chrome required for speech recognition.'); return; }

    ivrUsingFallback = true;
    interviewerRecognition = new SR();
    interviewerRecognition.continuous = true;
    interviewerRecognition.interimResults = true;
    interviewerRecognition.maxAlternatives = 3;
    interviewerRecognition.lang = getEffectiveLang();

    interviewerRecognition.onstart = () => {
      interviewerListening = true;
      setCardActive('tab', true);
      document.getElementById('tabIcon').classList.add('pulse');
      document.getElementById('tabIcon').textContent = '🔵';
      document.getElementById('tabStatus').textContent = '⚠️ Fallback (Web Speech) [' + getEffectiveLang() + ']';
      document.body.classList.add('listening');
    };

    interviewerRecognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          ivrResetTimer();
          const chunk = t.trim();
          if (chunk) ivrChunks.push(chunk);
          const soFar = ivrChunks.join(' ').trim();
          if (soFar) showTranscript('them', soFar, false);
        } else {
          interim += t;
          if (!ivrPhase1Sent) {
            const firstWord = t.trim().split(/\s+/)[0];
            if (firstWord) { sendTranscript(firstWord, false, 'interviewer', 1); ivrPhase1Sent = true; }
          } else {
            const preview = [...ivrChunks, t].join(' ').trim();
            sendTranscript(preview, false, 'interviewer', 2);
          }
        }
      }
      if (interim) showTranscript('them', interim, false);
    };

    interviewerRecognition.onerror = (e) => {
      if (e.error === 'not-allowed') { setCardError('tab', 'Mic blocked – check site settings.'); stopInterviewer(); }
      else if (e.error !== 'no-speech') document.getElementById('tabStatus').textContent = 'SR error: ' + e.error;
    };

    interviewerRecognition.onend = () => {
      if (interviewerListening) { try { interviewerRecognition.start(); } catch (_) {} }
      else { resetCard('tab'); }
    };

    try { interviewerRecognition.start(); } catch (_) {}
  }

  // ── UI helpers ────────────────────────────────────────────────────────
  function setCardActive(which, active) {
    const card = document.getElementById(which + 'Card');
    card.classList.toggle('active', active);
    card.classList.remove('error-state');
  }

  function setCardError(which, msg) {
    const card = document.getElementById(which + 'Card');
    card.classList.remove('active');
    card.classList.add('error-state');
    document.getElementById(which + 'Status').textContent = msg;
  }

  function resetCard(which) {
    const card = document.getElementById(which + 'Card');
    card.classList.remove('active', 'error-state');
    if (which === 'mic') {
      document.getElementById('micIcon').textContent = '🎤';
      document.getElementById('micIcon').classList.remove('pulse');
      document.getElementById('micStatus').textContent = 'Idle';
    } else {
      document.getElementById('tabIcon').textContent = '🖥️';
      document.getElementById('tabIcon').classList.remove('pulse');
      document.getElementById('tabStatus').textContent = 'Idle';
    }
  }

  function showTranscript(who, text, isFinal) {
    if (who === 'you') {
      const row = document.getElementById('youRow');
      const el  = document.getElementById('youText');
      row.style.display = 'flex';
      el.textContent = text;
      el.className   = 'tx-text' + (isFinal ? ' final' : '');
    } else {
      const row = document.getElementById('themRow');
      const el  = document.getElementById('themText');
      row.style.display = 'flex';
      el.textContent = text;
      el.className   = 'tx-text' + (isFinal ? ' final' : '');
    }
  }

  // ── Boot ──────────────────────────────────────────────────────────────
  setupMode();
  // default lang is en-US — only start the cycle if user switches to Auto

  if (AUTOSTART) {
    const overlay = document.getElementById('startOverlay');
    if (overlay) { overlay.classList.add('hidden'); setTimeout(() => overlay.remove(), 0); }
  }

  connectRelay();

  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(() => {});
  }

  if (AUTOSTART) {
    const _prevOnOpen = relaySocket.onopen;
    relaySocket.onopen = async (evt) => {
      if (_prevOnOpen) _prevOnOpen.call(relaySocket, evt);
      await detectActiveMic();
      if (MODE === 'mic' || MODE === 'both') startMic();
      if (MODE === 'interviewer') startInterviewer();
    };
    if (relaySocket.readyState === WebSocket.OPEN) {
      detectActiveMic().then(() => {
        if (MODE === 'mic' || MODE === 'both') startMic();
        if (MODE === 'interviewer') startInterviewer();
      });
    }
  }
</script>
</body>
</html>
