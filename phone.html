<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Interview Mic</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 24px;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.3s;
  }
  body.listening { background: #052e16; }

  h1 { font-size: 18px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }

  /* Relay status */
  #relayStatus {
    font-size: 11px;
    color: #4b5563;
    display: flex; align-items: center; gap: 6px;
  }
  #relayDot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #374151;
    transition: background 0.3s;
  }
  #relayDot.on  { background: #10b981; }
  #relayDot.off { background: #ef4444; }

  /* Active mic indicator */
  #activeMic {
    font-size: 12px;
    color: #6b7280;
    text-align: center;
    padding: 8px 16px;
    background: #161b22;
    border: 1.5px solid #1f2937;
    border-radius: 10px;
    max-width: 420px;
    width: 100%;
    transition: border-color 0.3s, color 0.3s;
  }
  #activeMic.cable { border-color: #3b82f6; color: #93c5fd; }
  #activeMic.physical { border-color: #10b981; color: #6ee7b7; }
  #activeMic.unknown { border-color: #f59e0b; color: #fcd34d; }

  /* Two capture cards side by side */
  #cards {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 420px;
  }
  .card {
    flex: 1;
    border-radius: 14px;
    border: 1.5px solid #1f2937;
    background: #161b22;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .card:active { opacity: 0.8; }
  .card.active {
    border-color: #10b981;
    background: #052e16;
  }
  .card.error-state { border-color: #ef4444; }
  .card.disabled {
    opacity: 0.35;
    pointer-events: none;
  }

  .card-icon { font-size: 36px; }
  .card-icon.pulse { animation: pulse 1.5s infinite; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.18); }
  }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #6b7280;
  }
  .card.active .card-label { color: #10b981; }

  .card-status {
    font-size: 11px;
    color: #4b5563;
    text-align: center;
    min-height: 14px;
  }
  .card.active .card-status { color: #34d399; }
  .card.error-state .card-status { color: #f87171; }

  /* Last heard transcript boxes */
  #transcripts {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .tx-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    min-height: 18px;
  }
  .tx-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    margin-top: 1px;
    flex-shrink: 0;
  }
  .tx-badge.you         { background: #064e3b; color: #6ee7b7; }
  .tx-badge.interviewer { background: #1e3a5f; color: #93c5fd; }
  .tx-text {
    font-size: 12px;
    color: #9ca3af;
    line-height: 1.5;
    font-style: italic;
  }
  .tx-text.final { color: #d1d5db; font-style: normal; }

  /* Setup instructions box */
  #hint {
    font-size: 11px;
    color: #374151;
    text-align: center;
    max-width: 380px;
    line-height: 1.7;
  }
  #hint b { color: #4b5563; font-weight: 600; }
  #hint .step { color: #6b7280; }
  #hint .highlight { color: #60a5fa; font-weight: 600; }

  /* Language selector */
  #langSelector {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 420px;
    width: 100%;
  }
  #langSelector span {
    font-size: 10px;
    color: #4b5563;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    margin-right: 2px;
  }
  .lang-btn {
    font-size: 11px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid #1f2937;
    background: #161b22;
    color: #6b7280;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .lang-btn:active { opacity: 0.75; }
  .lang-btn.selected {
    border-color: #10b981;
    background: #052e16;
    color: #6ee7b7;
  }
  .lang-btn.lang-auto.selected {
    border-color: #a78bfa;
    background: #2e1065;
    color: #c4b5fd;
  }

  /* Mode badge */
  #modeBadge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    background: #1e3a5f;
    color: #93c5fd;
  }
  #modeBadge.mode-mic { background: #064e3b; color: #6ee7b7; }
  #modeBadge.mode-interviewer { background: #1e3a5f; color: #93c5fd; }
  #modeBadge.mode-both { background: #3b1f5e; color: #c4b5fd; }

  /* One-tap start overlay */
  #startOverlay {
    position: fixed;
    inset: 0;
    background: #0f1117;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 100;
    cursor: pointer;
    transition: opacity 0.3s;
  }
  #startOverlay.hidden { opacity: 0; pointer-events: none; }
  #startOverlay h2 { font-size: 22px; font-weight: 700; color: #fff; }
  #startOverlay p  { font-size: 13px; color: #6b7280; text-align: center; max-width: 300px; line-height: 1.6; }
  #startBtn {
    margin-top: 8px;
    padding: 14px 36px;
    background: #10b981;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: -0.2px;
  }
  #startBtn:active { opacity: 0.85; }
  #overlayNote { font-size: 11px; color: #374151; text-align: center; max-width: 300px; }
</style>
</head>
<body>

<!-- One-tap gate -->
<div id="startOverlay" onclick="handleStart()">
  <div style="font-size:52px">🎙️</div>
  <h2>Interview Copilot</h2>
  <p id="overlayDesc">One tap to start. Chrome will ask for mic permission — make sure you pick the right device.</p>
  <button id="startBtn">Tap to Begin</button>
  <p id="overlayNote"></p>
</div>

<h1>Interview Copilot</h1>

<div id="modeBadge"></div>

<!-- Language selector -->
<div id="langSelector">
  <span>Lang:</span>
  <button class="lang-btn lang-auto" onclick="setLang('auto')" id="btn-auto">🌐 Auto</button>
  <button class="lang-btn selected" onclick="setLang('en-US')"  id="btn-en-US">🇺🇸 English</button>
  <button class="lang-btn" onclick="setLang('fil-PH')" id="btn-fil-PH">🇵🇭 Filipino</button>
  <button class="lang-btn" onclick="setLang('ceb-PH')" id="btn-ceb-PH">🇵🇭 Bisaya</button>
</div>

<div id="relayStatus">
  <div id="relayDot"></div>
  <span id="relayLabel">Connecting to relay…</span>
</div>

<!-- Shows which mic Chrome is actually using -->
<div id="activeMic">Detecting mic…</div>

<!-- Capture cards -->
<div id="cards">
  <div class="card" id="micCard" onclick="toggleMic()">
    <div class="card-icon" id="micIcon">🎤</div>
    <div class="card-label">Your Mic</div>
    <div class="card-status" id="micStatus">Idle</div>
  </div>

  <div class="card" id="tabCard" onclick="toggleTab()">
    <div class="card-icon" id="tabIcon">🖥️</div>
    <div class="card-label">Interviewer</div>
    <div class="card-status" id="tabStatus">Idle</div>
  </div>
</div>

<!-- Live transcript previews -->
<div id="transcripts">
  <div class="tx-row" id="youRow" style="display:none">
    <span class="tx-badge you">You</span>
    <span class="tx-text" id="youText"></span>
  </div>
  <div class="tx-row" id="themRow" style="display:none">
    <span class="tx-badge interviewer">Interviewer</span>
    <span class="tx-text" id="themText"></span>
  </div>
</div>

<div id="hint"></div>

<script>
  const RELAY_URL    = '{{RELAY_URL}}';
  const RELAY_SECRET = '{{RELAY_SECRET}}';
  const params       = new URLSearchParams(location.search);
  const AUTOSTART    = params.get('autostart') === '1';
  const MODE         = params.get('mode') || 'both'; // 'mic', 'interviewer', or 'both'

  // ── Language management ────────────────────────────────────────────────
  // Web Speech API can only handle one language at a time.
  // 'auto' mode cycles: fil-PH → en-US → ceb-PH so all three get recognised.
  // Cebuano (ceb-PH) is not natively supported by Chrome; we fall back to
  // fil-PH for that slot (which still catches many Bisaya words) and use
  // maxAlternatives=3 so mixed-language utterances get the best candidate.

  const AUTO_LANGS = ['fil-PH', 'en-US', 'fil-PH']; // cycle: Fil → EN → Fil (ceb fallback)
  // Note: Chrome's fil-PH model handles Cebuano reasonably well since both
  // share vocabulary. Pure ceb-PH isn't a recognised BCP-47 tag in Chrome.

  let selectedLang   = 'en-US'; // 'auto' | 'en-US' | 'fil-PH' | 'ceb-PH'
  let autoLangIndex  = 0;
  let autoLangTimer  = null;

  function getEffectiveLang() {
    if (selectedLang === 'auto')    return AUTO_LANGS[autoLangIndex];
    if (selectedLang === 'ceb-PH') return 'fil-PH'; // best available proxy
    return selectedLang;
  }

  function setLang(lang) {
    selectedLang = lang;
    // Update button styles
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'));
    const btnId = lang === 'auto'   ? 'btn-auto'
                : lang === 'en-US'  ? 'btn-en-US'
                : lang === 'fil-PH' ? 'btn-fil-PH'
                :                     'btn-ceb-PH';
    const btn = document.getElementById(btnId);
    if (btn) btn.classList.add('selected');

    if (lang === 'auto') {
      startAutoLangCycle();
    } else {
      stopAutoLangCycle();
    }

    // Restart active recognitions with new lang
    if (micListening)          { stopMic();          startMic(); }
    if (interviewerListening)  { stopInterviewer();  startInterviewer(); }
  }

  function startAutoLangCycle() {
    stopAutoLangCycle();
    // Rotate language every 8 s so each gets periodic coverage
    autoLangTimer = setInterval(() => {
      autoLangIndex = (autoLangIndex + 1) % AUTO_LANGS.length;
      // Bounce recognitions to pick up the new lang without interrupting flow
      if (micListening) {
        // Flush before bouncing so chunks from the old lang cycle aren't lost
        micFlushImmediate();
        try { micRecognition && micRecognition.stop(); } catch (_) {}
        // onend handler will restart it with the new lang
      }
      if (interviewerListening) {
        // Flush before bouncing so chunks from the old lang cycle aren't lost
        ivrFlushImmediate();
        try { interviewerRecognition && interviewerRecognition.stop(); } catch (_) {}
      }
    }, 8000);
  }

  function stopAutoLangCycle() {
    clearInterval(autoLangTimer);
    autoLangTimer = null;
  }

  // ── Mode setup ─────────────────────────────────────────────────────────
  // Chrome SpeechRecognition ALWAYS uses one mic — whatever Chrome has set
  // for this site. You CANNOT have two SpeechRecognition instances on the
  // same page using different audio devices.
  //
  // Solution: open the page in TWO windows with different Chrome profiles
  // (or one normal + one incognito). Each window sets a different mic in
  // Chrome's site settings.
  //
  //   Window 1: /?mode=mic           → Chrome mic = physical mic
  //   Window 2: /?mode=interviewer   → Chrome mic = CABLE Output (VB-Cable)
  //
  // Both connect to the same relay. Transcripts are labelled correctly.

  function setupMode() {
    const badge = document.getElementById('modeBadge');
    const hint  = document.getElementById('hint');
    const overlayDesc = document.getElementById('overlayDesc');
    const overlayNote = document.getElementById('overlayNote');

    if (MODE === 'mic') {
      badge.textContent = '🎤 Your Mic Mode';
      badge.className = 'mode-mic';
      document.getElementById('tabCard').classList.add('disabled');
      overlayDesc.innerHTML = 'This window captures <b>your voice</b>.<br>When Chrome asks, pick your <b>physical microphone</b>.';
      overlayNote.innerHTML = 'Open a second window with <b>?mode=interviewer</b> for the other person\'s audio.';
      hint.innerHTML =
        '<b>🎤 Your Mic Mode</b><br>' +
        'This window transcribes <b>your voice</b> using your physical mic.<br>' +
        'Chrome is using the mic shown above ↑';
    } else if (MODE === 'interviewer') {
      badge.textContent = '🖥️ Interviewer Mode';
      badge.className = 'mode-interviewer';
      document.getElementById('micCard').classList.add('disabled');
      overlayDesc.innerHTML = 'This window captures <b>interviewer audio</b> via VB-Cable.<br>When Chrome asks, pick <b>CABLE Output (VB-Audio Virtual Cable)</b>.';
      overlayNote.innerHTML = '⚠️ Open this in <b>Incognito</b> or a <b>different Chrome profile</b> so it gets its own mic setting.';
      hint.innerHTML =
        '<b>🖥️ Interviewer Mode</b><br>' +
        'This window transcribes <b>interviewer audio</b> from VB-Cable.<br><br>' +
        '<span class="step">1.</span> Set <span class="highlight">CABLE Input</span> as your <b>default speaker</b> in Windows Sound settings<br>' +
        '<span class="step">2.</span> In Google Meet → use your <b>real mic</b> for your voice,<br>' +
        '&nbsp;&nbsp;&nbsp;and set speaker to <span class="highlight">CABLE Input</span><br>' +
        '<span class="step">3.</span> Chrome above should show <span class="highlight">CABLE Output</span> as the active mic<br><br>' +
        'Not seeing CABLE Output? Click the 🔒 icon in the address bar →<br>Site settings → Microphone → select <b>CABLE Output</b> → reload.';
    } else {
      badge.textContent = '⚡ Both Channels';
      badge.className = 'mode-both';
      overlayDesc.innerHTML =
        'One tap to start.<br><br>' +
        '⚠️ <b>Important:</b> Chrome can only use ONE mic per window.<br>' +
        'For best results, open <b>two separate windows</b>:';
      overlayNote.innerHTML =
        'Window 1: <b>?mode=mic</b> (normal Chrome)<br>' +
        'Window 2: <b>?mode=interviewer</b> (Incognito / different profile)';
      hint.innerHTML =
        '<b>⚡ Combined Mode</b><br>' +
        'Both cards use the <b>same mic</b> (Chrome\'s default for this site).<br>' +
        'Transcripts will be labelled differently but come from the same source.<br><br>' +
        'For <b>true dual-source capture</b>, use two windows:<br>' +
        '<span class="highlight">?mode=mic</span> + <span class="highlight">?mode=interviewer</span>';
    }
  }

  // ── Detect which mic Chrome is actually using ──────────────────────────
  let detectedMicLabel = '';

  async function detectActiveMic() {
    const el = document.getElementById('activeMic');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const track  = stream.getAudioTracks()[0];
      const label  = track.label || 'Unknown device';
      detectedMicLabel = label;
      track.stop();

      el.textContent = '🎧 Chrome is using: ' + label;

      const lower = label.toLowerCase();
      if (lower.includes('cable') || lower.includes('vb-audio') || lower.includes('virtual')) {
        el.className = 'cable';
        if (MODE === 'mic') {
          el.textContent += ' ⚠️ (This is VB-Cable — you need your physical mic here!)';
          el.className = 'unknown';
        }
      } else {
        el.className = 'physical';
        if (MODE === 'interviewer') {
          el.textContent += ' ⚠️ (This is your physical mic — you need VB-Cable here!)';
          el.className = 'unknown';
        }
      }
    } catch (err) {
      el.textContent = '⚠️ Mic access denied — grant permission first';
      el.className = 'unknown';
    }
  }

  // ── Relay ────────────────────────────────────────────────────────────
  let relaySocket    = null;
  let pingInterval   = null;
  let reconnectTimer = null;

  function connectRelay() {
    clearTimeout(reconnectTimer);
    if (relaySocket?.readyState === WebSocket.OPEN) return;
    relaySocket = new WebSocket(RELAY_URL + '?role=phone&secret=' + RELAY_SECRET);

    relaySocket.onopen = () => {
      setRelayDot(true);
      pingInterval = setInterval(() => {
        if (relaySocket?.readyState === WebSocket.OPEN)
          relaySocket.send(JSON.stringify({ type: 'ping' }));
      }, 20000);
    };
    relaySocket.onclose = () => {
      setRelayDot(false);
      clearInterval(pingInterval);
      reconnectTimer = setTimeout(connectRelay, 5000);
    };
    relaySocket.onerror = () => setRelayDot(false);
  }

  function sendTranscript(text, isFinal, speaker, phase) {
    if (relaySocket?.readyState === WebSocket.OPEN)
      relaySocket.send(JSON.stringify({ type: 'transcript', text, isFinal, speaker, phase: phase ?? 'interim' }));
  }

  function setRelayDot(on) {
    document.getElementById('relayDot').className      = on ? 'on' : 'off';
    document.getElementById('relayLabel').textContent  = on
      ? 'Relay connected' : 'Relay disconnected – retrying…';
  }

  // ── Start overlay ───────────────────────────────────────────────────
  let startFired = false;
  async function handleStart() {
    if (startFired) return;
    startFired = true;
    const el = document.getElementById('startOverlay');
    el.classList.add('hidden');
    setTimeout(() => el.remove(), 400);

    // Detect which mic Chrome is actually using
    await detectActiveMic();

    // Auto-start the appropriate card based on mode
    if (MODE === 'mic' || MODE === 'both') startMic();
    if (MODE === 'interviewer') startInterviewer();
  }

  // ── Mic (SpeechRecognition — your own voice) ─────────────────────────
  let micRecognition     = null;
  let micListening       = false;
  let micPhase1Sent      = false; // resets after each final result

  // ── Sentence accumulator for mic channel ─────────────────────────────
  // Chrome fires isFinal on every silence gap, even mid-sentence.
  // "If a computer is turning on but the monitor remains completely black…"
  // can arrive as 2–3 separate isFinal events before the person finishes.
  // Same SILENCE_MS timer used on the interviewer channel — flush only
  // after MIC_SILENCE_MS with no new final, joining all chunks first.
  //
  // MIC_SILENCE_MS: wait a full 2 s of silence before flushing.
  // Chrome fires isFinal (sometimes with empty text) on period/clause boundaries
  // mid-sentence. The timer resets on EVERY isFinal — empty or not — so those
  // boundary events can't accidentally let an old countdown expire early.
  // Relay only gets the complete sentence after 2 s of genuine silence.
  const MIC_SILENCE_MS    = 2000;
  let micChunks           = [];   // accumulated final chunks this utterance
  let micSilenceTimer     = null; // setTimeout handle

  function micResetTimer() {
    clearTimeout(micSilenceTimer);
    micSilenceTimer = setTimeout(micFlush, MIC_SILENCE_MS);
  }

  function micFlush() {
    clearTimeout(micSilenceTimer);
    micSilenceTimer = null;
    if (micChunks.length === 0) return;
    const full = micChunks.join(' ').replace(/\s+/g, ' ').trim();
    micChunks     = [];
    micPhase1Sent = false;
    if (!full) return;
    showTranscript('you', full, true);
    sendTranscript(full, true, 'you', 'final');
  }

  function micFlushImmediate() {
    clearTimeout(micSilenceTimer);
    micSilenceTimer = null;
    micFlush();
  }

  function toggleMic() {
    if (MODE === 'interviewer') return; // disabled in interviewer mode
    if (micListening) stopMic(); else startMic();
  }

  function startMic() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      setCardError('mic', 'Use Chrome for mic support.');
      return;
    }
    micRecognition = new SR();
    micRecognition.continuous      = true;
    micRecognition.interimResults  = true;
    micRecognition.maxAlternatives = 3;
    micRecognition.lang            = getEffectiveLang();

    micRecognition.onstart = () => {
      micListening = true;
      setCardActive('mic', true);
      document.getElementById('micIcon').classList.add('pulse');
      document.getElementById('micIcon').textContent = '🔴';
      document.getElementById('micStatus').textContent = 'Listening… [' + getEffectiveLang() + ']';
      document.body.classList.add('listening');
    };

    micRecognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          // ── Accumulate instead of sending immediately ──────────────────
          // ALWAYS reset the silence timer on any isFinal event — Chrome fires
          // isFinal with empty text at period/sentence boundaries, and if we
          // skip the reset those boundary events let the old timer expire early.
          micResetTimer(); // restart 2000ms countdown on every isFinal (even empty)
          const chunk = t.trim();
          if (chunk) micChunks.push(chunk);
          // Show accumulated text so far on phone UI (live feedback)
          const soFar = micChunks.join(' ').trim();
          if (soFar) showTranscript('you', soFar, false); // false = still building
        } else {
          interim += t;
          if (!micPhase1Sent) {
            // Phase 1: send just the first word immediately
            const firstWord = t.trim().split(/\s+/)[0];
            if (firstWord) {
              sendTranscript(firstWord, false, 'you', 1);
              micPhase1Sent = true;
            }
          } else {
            // Phase 2: send combined "chunks so far + current interim"
            const preview = [...micChunks, t].join(' ').trim();
            sendTranscript(preview, false, 'you', 2);
          }
        }
      }
      if (interim) showTranscript('you', interim, false);
    };

    micRecognition.onerror = (e) => {
      if (e.error === 'not-allowed') {
        setCardError('mic', 'Mic blocked – check permissions.');
        stopMic();
      } else if (e.error !== 'no-speech') {
        document.getElementById('micStatus').textContent = 'Error: ' + e.error;
      }
    };

    micRecognition.onend = () => {
      if (micListening) {
        try { micRecognition.start(); } catch (_) {}
      } else {
        resetCard('mic');
      }
    };

    try { micRecognition.start(); } catch (_) {}
  }

  function stopMic() {
    micListening = false;
    // Flush any buffered chunks before stopping — don't lose partial sentences
    micFlushImmediate();
    if (micRecognition) { try { micRecognition.stop(); } catch (_) {} micRecognition = null; }
    resetCard('mic');
    if (!interviewerListening) document.body.classList.remove('listening');
  }

  // ── Sentence accumulator for slow/pausing interviewers ───────────────
  // Chrome finalises a result on every silence gap, even mid-sentence.
  // A slow speaker: "Can you tell me… about your… experience with Docker?"
  // arrives as 3 separate isFinal=true events — each fragment too short to
  // trigger AI on the overlay, and the overlay only sees the last one.
  //
  // Fix: buffer consecutive finals here on the phone. Only flush (send one
  // combined final to the overlay) after SILENCE_MS with no new transcript.
  // Interim updates still go through immediately so the live display works.
  //
  // SILENCE_MS = 1800ms rationale:
  //   ~800ms  = normal clause pause (speaker still going)
  //   ~1200ms = "thinking" pause mid-sentence
  //   ~1500ms = true sentence boundary for most speakers
  //    1800ms = comfortable margin for slow/deliberate speech
  //
  // Only applied to the interviewer channel. Your own mic (mic card) sends
  // finals immediately — you're not trying to AI-answer your own words.

  const SILENCE_MS    = 2000;
  let ivrChunks       = [];   // accumulated final chunks this utterance
  let ivrSilenceTimer = null; // setTimeout handle
  let ivrPhase1Sent   = false; // tracks whether phase-1 word was sent

  function ivrResetTimer() {
    clearTimeout(ivrSilenceTimer);
    ivrSilenceTimer = setTimeout(ivrFlush, SILENCE_MS);
  }

  function ivrFlush() {
    clearTimeout(ivrSilenceTimer);
    ivrSilenceTimer = null;
    if (ivrChunks.length === 0) return;
    const full = ivrChunks.join(' ').replace(/\s+/g, ' ').trim();
    ivrChunks     = [];
    ivrPhase1Sent = false;
    if (!full) return;
    showTranscript('them', full, true);                    // mark as final on phone UI
    sendTranscript(full, true, 'interviewer', 'final');    // one clean final to overlay
  }

  function ivrFlushImmediate() {
    // Called when recognition stops — don't wait for the timer
    clearTimeout(ivrSilenceTimer);
    ivrSilenceTimer = null;
    ivrFlush();
  }

  // ── Interviewer (SpeechRecognition — VB-Cable audio) ──────────────────
  // This uses the SAME SpeechRecognition API. It works because this window
  // has its Chrome mic set to VB-Cable (via site settings / different profile).
  let interviewerRecognition = null;
  let interviewerListening   = false;
  let interviewerPhase1Sent  = false; // kept for symmetry — unused (ivrPhase1Sent used instead)

  function toggleTab() {
    if (MODE === 'mic') return; // disabled in mic mode
    if (interviewerListening) stopInterviewer(); else startInterviewer();
  }

  function startInterviewer() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      setCardError('tab', 'Chrome required for speech recognition.');
      return;
    }

    interviewerRecognition = new SR();
    interviewerRecognition.continuous      = true;
    interviewerRecognition.interimResults  = true;
    interviewerRecognition.maxAlternatives = 3;
    interviewerRecognition.lang            = getEffectiveLang();

    interviewerRecognition.onstart = () => {
      interviewerListening = true;
      setCardActive('tab', true);
      document.getElementById('tabIcon').classList.add('pulse');
      document.getElementById('tabIcon').textContent = '🔵';
      document.getElementById('tabStatus').textContent = 'Listening via ' + (detectedMicLabel || 'Chrome mic') + ' [' + getEffectiveLang() + ']';
      document.body.classList.add('listening');
    };

    interviewerRecognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          // ── Accumulate instead of sending immediately ──────────────────
          // ALWAYS reset the silence timer on any isFinal event — Chrome fires
          // isFinal with empty text at period/sentence boundaries, and if we
          // skip the reset those boundary events let the old timer expire early.
          ivrResetTimer(); // restart 2000ms countdown on every isFinal (even empty)
          const chunk = t.trim();
          if (chunk) ivrChunks.push(chunk);
          // Show accumulated text so far on phone UI (live feedback)
          const soFar = ivrChunks.join(' ').trim();
          if (soFar) showTranscript('them', soFar, false); // false = still building
        } else {
          // Interim: show live on phone, send phase-1/2 to overlay for early
          // classification (classifyEarly runs on these — zero latency impact)
          interim += t;
          if (!ivrPhase1Sent) {
            const firstWord = t.trim().split(/\s+/)[0];
            if (firstWord) {
              sendTranscript(firstWord, false, 'interviewer', 1);
              ivrPhase1Sent = true;
            }
          } else {
            // Phase 2: send the combined "chunks so far + current interim"
            // so the overlay's classifyEarly sees the full growing sentence
            const preview = [...ivrChunks, t].join(' ').trim();
            sendTranscript(preview, false, 'interviewer', 2);
          }
        }
      }
      if (interim) showTranscript('them', interim, false);
    };

    interviewerRecognition.onerror = (e) => {
      if (e.error === 'not-allowed') {
        setCardError('tab', 'Mic blocked – check site settings.');
        stopInterviewer();
      } else if (e.error !== 'no-speech') {
        document.getElementById('tabStatus').textContent = 'SR error: ' + e.error;
      }
    };

    interviewerRecognition.onend = () => {
      if (interviewerListening) {
        try { interviewerRecognition.start(); } catch (_) {}
      } else {
        resetCard('tab');
        if (!micListening) document.body.classList.remove('listening');
      }
    };

    try { interviewerRecognition.start(); } catch (_) {}
  }

  function stopInterviewer() {
    interviewerListening = false;
    // Flush any buffered chunks before stopping — don't lose partial sentences
    ivrFlushImmediate();
    if (interviewerRecognition) { try { interviewerRecognition.stop(); } catch (_) {} interviewerRecognition = null; }
    resetCard('tab');
    if (!micListening) document.body.classList.remove('listening');
  }

  // ── UI helpers ────────────────────────────────────────────────────────
  function setCardActive(which, active) {
    const card = document.getElementById(which + 'Card');
    card.classList.toggle('active', active);
    card.classList.remove('error-state');
  }

  function setCardError(which, msg) {
    const card = document.getElementById(which + 'Card');
    card.classList.remove('active');
    card.classList.add('error-state');
    document.getElementById(which + 'Status').textContent = msg;
  }

  function resetCard(which) {
    const card = document.getElementById(which + 'Card');
    card.classList.remove('active', 'error-state');
    if (which === 'mic') {
      document.getElementById('micIcon').textContent = '🎤';
      document.getElementById('micIcon').classList.remove('pulse');
      document.getElementById('micStatus').textContent = 'Idle';
    } else {
      document.getElementById('tabIcon').textContent = '🖥️';
      document.getElementById('tabIcon').classList.remove('pulse');
      document.getElementById('tabStatus').textContent = 'Idle';
    }
  }

  function showTranscript(who, text, isFinal) {
    if (who === 'you') {
      const row = document.getElementById('youRow');
      const el  = document.getElementById('youText');
      row.style.display = 'flex';
      el.textContent = text;
      el.className   = 'tx-text' + (isFinal ? ' final' : '');
    } else {
      const row = document.getElementById('themRow');
      const el  = document.getElementById('themText');
      row.style.display = 'flex';
      el.textContent = text;
      el.className   = 'tx-text' + (isFinal ? ' final' : '');
    }
  }

  // ── Boot ──────────────────────────────────────────────────────────────
  setupMode();
  // default lang is en-US — only start the cycle if user switches to Auto

  if (AUTOSTART) {
    const overlay = document.getElementById('startOverlay');
    if (overlay) { overlay.classList.add('hidden'); setTimeout(() => overlay.remove(), 0); }
  }

  connectRelay();

  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(() => {});
  }

  if (AUTOSTART) {
    const _prevOnOpen = relaySocket.onopen;
    relaySocket.onopen = async (evt) => {
      if (_prevOnOpen) _prevOnOpen.call(relaySocket, evt);
      await detectActiveMic();
      if (MODE === 'mic' || MODE === 'both') startMic();
      if (MODE === 'interviewer') startInterviewer();
    };
    if (relaySocket.readyState === WebSocket.OPEN) {
      detectActiveMic().then(() => {
        if (MODE === 'mic' || MODE === 'both') startMic();
        if (MODE === 'interviewer') startInterviewer();
      });
    }
  }
</script>
</body>
</html>
