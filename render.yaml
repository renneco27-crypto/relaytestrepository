services:
  - type: web
    name: interview-relay
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: RELAY_URL
        value: wss://your-relay-url.onrender.com   # Replace with your actual Render service URL
      - key: RELAY_SECRET
        # Paste your secret in Render dashboard — do not commit the value here
